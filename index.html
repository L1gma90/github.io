<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация продукта — Современная кухня</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

<main class="container">
    <section class="left-panel">
        <div class="content-wrapper">
            <span class="badge">Премиум линейка</span>
            <h1>Современная кухня</h1>
            <p class="description">
                Погрузитесь в детали вашего будущего интерьера. Взаимодействуйте с высокоточной 3D-моделью прямо в браузере: вращайте, приближайте и рассматривайте текстуры фасадов со всех сторон.
            </p>
            <button class="cta-button">Оставить заявку</button>
        </div>
    </section>

    <section class="right-panel">
        <model-viewer
            src="cozy-kitchen.glb"
            camera-controls
            auto-rotate
            interaction-prompt="auto"
            shadow-intensity="1.5"
            exposure="1.2"
            ar>
        </model-viewer>
    </section>
</main>

</body>
</html>
