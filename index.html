<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация продукта</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 40%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right {
            width: 60%;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        button {
            width: 200px;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0; /* Добавим фон, чтобы видеть границы блока */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>Современная кухня</h1>
        <p>
            Изучите модель в 3D.
            Поворачивайте, приближайте и рассматривайте детали.
        </p>
        <button>Оставить заявку</button>
    </div>

    <div class="right">
        <model-viewer
            src="model.glb"
            camera-controls
            auto-rotate>
        </model-viewer>
    </div>
</div>

</body>
</html>
